[book]
title = "The Luban Book"
description = "Windows-first C++ toolchain manager + cmake/vcpkg auxiliary frontend"
authors = ["Luban contributors"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Coh1e/luban"
edit-url-template = "https://github.com/Coh1e/luban/edit/main/docs/{path}"
site-url = "/"
cname = ""

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.print]
enable = true
