add_newline = false
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$c\
$cmake\
$rust\
$nodejs\
$python\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "yellow"

[c]
symbol = " "
format = "[$symbol($version )]($style)"
style = "blue"

[cmake]
symbol = "△ "
format = "[$symbol($version )]($style)"
style = "blue"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "red"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"

[python]
symbol = " "
format = "[$symbol($version )]($style)"
style = "yellow"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "dimmed white"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"