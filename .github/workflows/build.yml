name: Build luban.exe

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "third_party/**"
      - "templates/**"
      - "manifests_seed/**"
      - "tests/**"
      - "scripts/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write   # for release asset upload on tag

    steps:
      - uses: actions/checkout@v4

      # ---- Toolchain: LLVM-MinGW (cached) ----
      - name: Cache LLVM-MinGW
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: C:\toolchains\llvm-mingw
          key: llvm-mingw-20260421-x86_64-v1

      - name: Download LLVM-MinGW
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260421/llvm-mingw-20260421-ucrt-x86_64.zip"
          $zip = "$env:RUNNER_TEMP\llvm-mingw.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath C:\toolchains
          Move-Item C:\toolchains\llvm-mingw-* C:\toolchains\llvm-mingw
          Remove-Item $zip

      # ---- ninja (windows-latest preinstalls cmake; only ninja is missing) ----
      - name: Cache ninja
        id: cache-ninja
        uses: actions/cache@v4
        with:
          path: C:\toolchains\ninja
          key: ninja-1.13.2-win-v1

      - name: Download ninja
        if: steps.cache-ninja.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-win.zip"
          $zip = "$env:RUNNER_TEMP\ninja.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          New-Item -ItemType Directory -Path C:\toolchains\ninja -Force | Out-Null
          Expand-Archive -Path $zip -DestinationPath C:\toolchains\ninja
          Remove-Item $zip

      - name: Add toolchains to PATH
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "C:\toolchains\llvm-mingw\bin"
          Add-Content $env:GITHUB_PATH "C:\toolchains\ninja"

      - name: Verify toolchain
        shell: pwsh
        run: |
          clang --version
          cmake --version
          ninja --version

      # ---- Build (release preset) ----
      - name: CMake configure
        shell: pwsh
        run: cmake --preset release

      - name: CMake build
        shell: pwsh
        run: cmake --build --preset release

      - name: Smoke test (basic)
        shell: pwsh
        run: |
          .\build\release\luban.exe --version
          .\build\release\luban.exe --help

      # ---- Unit tests (doctest, ADR-0004) ----
      # luban-tests is EXCLUDE_FROM_ALL so we build it explicitly. The
      # binary self-runs all TEST_CASE blocks; non-zero exit on any failure.
      - name: Build luban-tests
        shell: pwsh
        run: cmake --build --preset release --target luban-tests
      - name: Run luban-tests
        shell: pwsh
        run: .\build\release\luban-tests.exe

      # ---- Smoke test (end-to-end) ----
      # 9 steps covering scaffold → add/remove → build → run → specs →
      # target add/build/remove → doctor. Uses the LLVM-MinGW + ninja +
      # cmake we already staged on PATH above; doesn't require
      # `luban setup` (which would pull ~250 MB of toolchains).
      # Failure exits with the failed step number; project preserved
      # in %TEMP% for postmortem (CI logs print the path).
      - name: Smoke test (end-to-end)
        shell: cmd
        run: scripts\smoke.bat

      # ---- Upload artifact (every build) ----
      - uses: actions/upload-artifact@v4
        with:
          name: luban-${{ github.sha }}
          path: |
            build/release/luban.exe
            build/release/luban-shim.exe
          retention-days: 30

      # ---- On tag push: SHA256SUMS + upload to release ----
      - name: Generate SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          cd build/release
          $sums = ""
          foreach ($f in 'luban.exe', 'luban-shim.exe') {
              $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
              $sums += "$hash  $f`n"
          }
          $sums | Out-File -Encoding ascii SHA256SUMS -NoNewline
          Write-Host "Computed SHA256SUMS:"
          Get-Content SHA256SUMS

      - name: Upload to release (create if missing)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          # Try to create release with assets; if it already exists, fall through
          # to upload --clobber. Either path leaves the release with up-to-date
          # binaries + SHA256SUMS.
          gh release create $tag `
            build/release/luban.exe `
            build/release/luban-shim.exe `
            build/release/SHA256SUMS `
            --title "luban $tag" `
            --generate-notes 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
              Write-Host "Release $tag exists; uploading with --clobber"
              gh release upload $tag `
                build/release/luban.exe `
                build/release/luban-shim.exe `
                build/release/SHA256SUMS `
                --clobber
          }

  # ---- M4 Phase A: POSIX build smoke (ADR-0006) ----
  # First non-Windows CI feedback. Build-only — does NOT run unit tests on
  # POSIX yet (test_hash exercises hash::hash_file which is a nullopt stub
  # there until Phase B implements OpenSSL backing). luban itself builds
  # against the existing #else branches in proc/log/paths/etc.
  #
  # continue-on-error: true keeps the windows build's success/failure as
  # the gating signal while the POSIX branches stabilize. Drop the flag
  # once Linux+macOS go green for a few consecutive runs.
  linux-build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Verify toolchain
        run: |
          clang --version
          cmake --version
          ninja --version

      - name: CMake configure (release)
        run: cmake --preset release

      - name: Build luban
        run: cmake --build --preset release

      - name: Build luban-tests
        run: cmake --build --preset release --target luban-tests

      - name: Smoke run luban --version (no-op on POSIX, just verifies link)
        run: ./build/release/luban --version || echo "luban --version exit non-zero (expected for now)"

  macos-build:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          brew install cmake ninja

      - name: Verify toolchain
        run: |
          clang --version
          cmake --version
          ninja --version

      - name: CMake configure (release)
        run: cmake --preset release

      - name: Build luban
        run: cmake --build --preset release

      - name: Build luban-tests
        run: cmake --build --preset release --target luban-tests

      - name: Smoke run luban --version
        run: ./build/release/luban --version || echo "luban --version exit non-zero (expected for now)"
