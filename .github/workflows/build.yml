name: build

# Single-flavor Windows release: every tag push produces one MSVC build.
# Static-linked (/MT) so invariant 7 holds — no vcruntime / msvcp /
# api-ms-win-crt deps. luban is Windows-first by design (DESIGN §1) and
# v1.0.5+ stops shipping the LLVM-MinGW fallback flavor: macOS / Linux
# users have nix / brew / apt and don't need a Win-targeted launcher.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: windows-x64 (MSVC, /MT)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build/release `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DLUBAN_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build/release --parallel

      - name: Verify static linkage (invariant 7)
        shell: pwsh
        run: |
          $deps = & dumpbin /DEPENDENTS build/release/luban.exe
          Write-Host ($deps -join "`n")
          $bad = $deps | Select-String -Pattern '(vcruntime|msvcp|api-ms-win-crt)' -CaseSensitive:$false
          if ($bad) {
            Write-Error "luban.exe has dynamic CRT deps:`n$($bad -join "`n")"
            exit 1
          }
          Write-Host "OK: luban.exe is statically linked."

      - name: Smoke test
        shell: pwsh
        run: |
          build/release/luban.exe --version
          build/release/luban.exe --help | Select-Object -First 5

      - name: Stage release artifacts + SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item build/release/luban.exe       dist/luban.exe
          Copy-Item build/release/luban-shim.exe  dist/luban-shim.exe
          Push-Location dist
          $luban = (Get-FileHash -Algorithm SHA256 luban.exe).Hash.ToLower()
          $shim  = (Get-FileHash -Algorithm SHA256 luban-shim.exe).Hash.ToLower()
          "$luban  luban.exe`n$shim  luban-shim.exe" | Out-File -FilePath SHA256SUMS -Encoding ASCII
          Get-Content SHA256SUMS | Write-Host
          Pop-Location

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/luban.exe
            dist/luban-shim.exe
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
