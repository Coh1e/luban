name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "third_party/**"
      - "README.md"
      - "install.ps1"
      - "install.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write   # for gh-pages push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- mdBook (user manual) ----
      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build mdBook (English)
        working-directory: docs
        run: mdbook build

      - name: Build mdBook (中文)
        working-directory: docs
        env:
          MDBOOK_BOOK__SRC: src-zh
          MDBOOK_BOOK__TITLE: "Luban 中文手册"
          MDBOOK_BOOK__LANGUAGE: zh-CN
          MDBOOK_OUTPUT__HTML__SITE_URL: /zh/
        run: mdbook build -d book-zh

      # ---- Doxygen (contributor reference) ----
      - name: Install Doxygen
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends doxygen

      - name: Build Doxygen
        working-directory: docs
        run: |
          mkdir -p ../build/docs/api
          doxygen Doxyfile

      # ---- Combine: mdBook at /, Chinese mdBook at /zh/, Doxygen at /api/,
      # install scripts at /install.{ps1,sh} so `irm | iex` URLs work ----
      - name: Stage combined site
        run: |
          mkdir -p _site
          cp -r docs/book/. _site/
          mkdir -p _site/zh
          cp -r docs/book-zh/. _site/zh/
          mkdir -p _site/api
          cp -r build/docs/api/. _site/api/
          cp install.ps1 _site/install.ps1
          cp install.sh  _site/install.sh

      # ---- Deploy to gh-pages branch (Cloudflare Pages reads this) ----
      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          # Cloudflare Pages connects to this repo + branch directly,
          # OR you can point CF Pages at the gh-pages branch root.
          force_orphan: true
          cname: luban.coh1e.com   # remove if you don't own the domain
